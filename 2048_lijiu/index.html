<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>合成大兔兔</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1b2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 20px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            cursor: crosshair;
        }
        #new-game-btn {
            margin-top: 15px;
            padding: 12px 40px;
            background: #b388ff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #new-game-btn:hover { background: #9c64f7; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <button id="new-game-btn" onclick="startNewGame()">🐰 新游戏</button>

    <script>
        const { Engine, Events, Bodies, Composite, Runner } = Matter;

        const W = 360, H = 640;
        const PANEL_H = 80;
        const WALL_T = 40;
        const DROP_Y = PANEL_H + 45;
        const DANGER_Y = PANEL_H + 28;

        const RABBITS = [
            { emoji: '🐰', radius: 22,  color: '#f8d7e3', name: '小白兔' },
            { emoji: '🐇', radius: 30,  color: '#e8d5f5', name: '跳跳兔' },
            { emoji: '🐰', radius: 38,  color: '#d4f0ff', name: '粉兔兔' },
            { emoji: '🫧', radius: 47,  color: '#c8f7c5', name: '泡泡兔' },
            { emoji: '🌸', radius: 57,  color: '#ffd6e7', name: '花花兔' },
            { emoji: '🌙', radius: 67,  color: '#c5cdf7', name: '月兔' },
            { emoji: '⭐', radius: 78,  color: '#fff3b0', name: '星星兔' },
            { emoji: '🌈', radius: 90,  color: '#ffd5a8', name: '彩虹兔' },
            { emoji: '💫', radius: 103, color: '#b2f0e8', name: '闪光兔' },
            { emoji: '🔮', radius: 117, color: '#d0aaff', name: '魔法兔' },
            { emoji: '👑🐇', radius: 133, color: '#ffe066', name: '兔王' },
        ];

        const canvas = document.getElementById('gameCanvas');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        let engine, runner, world;
        let rabbitBodies = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('rabbitMergeBest')) || 0;
        let currentLevel = 0;
        let nextLevel = 0;
        let dropX = W / 2;
        let gameOver = false;
        let canDrop = true;
        let mergePending = new Set();
        let mergeEffects = [];

        function initPhysics() {
            engine = Engine.create({ gravity: { y: 2 } });
            world = engine.world;
            runner = Runner.create();

            const ground = Bodies.rectangle(W / 2, H + WALL_T / 2, W * 2, WALL_T, { isStatic: true, label: 'wall' });
            const wallL = Bodies.rectangle(-WALL_T / 2, H / 2, WALL_T, H * 2, { isStatic: true, label: 'wall' });
            const wallR = Bodies.rectangle(W + WALL_T / 2, H / 2, WALL_T, H * 2, { isStatic: true, label: 'wall' });
            Composite.add(world, [ground, wallL, wallR]);

            Events.on(engine, 'collisionStart', handleCollision);
            Runner.run(runner, engine);
            requestAnimationFrame(gameLoop);
        }

        function handleCollision(event) {
            for (const pair of event.pairs) {
                const { bodyA, bodyB } = pair;
                if (bodyA.label !== 'rabbit' || bodyB.label !== 'rabbit') continue;

                const rA = rabbitBodies.find(c => c.body.id === bodyA.id);
                const rB = rabbitBodies.find(c => c.body.id === bodyB.id);
                if (!rA || !rB) continue;
                if (rA.level !== rB.level) continue;
                if (mergePending.has(bodyA.id) || mergePending.has(bodyB.id)) continue;
                if (rA.level >= RABBITS.length - 1) continue;

                mergePending.add(bodyA.id);
                mergePending.add(bodyB.id);

                const newLevel = rA.level + 1;
                const mx = (bodyA.position.x + bodyB.position.x) / 2;
                const my = (bodyA.position.y + bodyB.position.y) / 2;

                setTimeout(() => {
                    Composite.remove(world, bodyA);
                    Composite.remove(world, bodyB);
                    rabbitBodies = rabbitBodies.filter(c => c.body.id !== bodyA.id && c.body.id !== bodyB.id);
                    mergePending.delete(bodyA.id);
                    mergePending.delete(bodyB.id);

                    addRabbitBody(mx, my, newLevel);
                    mergeEffects.push({ x: mx, y: my, r: RABBITS[newLevel].radius, alpha: 1, color: RABBITS[newLevel].color });

                    score += newLevel * newLevel * 10;
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('rabbitMergeBest', bestScore);
                    }
                }, 50);
            }
        }

        function addRabbitBody(x, y, level) {
            const r = RABBITS[level].radius;
            const body = Bodies.circle(x, y, r, {
                restitution: 0.35,
                friction: 0.4,
                frictionAir: 0.008,
                label: 'rabbit',
            });
            body._spawnTime = Date.now();
            Composite.add(world, body);
            rabbitBodies.push({ body, level });
            return body;
        }

        function dropRabbit() {
            if (!canDrop || gameOver) return;
            canDrop = false;

            const r = RABBITS[currentLevel].radius;
            const clampedX = Math.max(r + 5, Math.min(W - r - 5, dropX));
            addRabbitBody(clampedX, DROP_Y, currentLevel);

            currentLevel = nextLevel;
            nextLevel = randomStartLevel();

            setTimeout(() => {
                canDrop = true;
                setTimeout(checkGameOver, 1500);
            }, 450);
        }

        function checkGameOver() {
            if (gameOver || !canDrop) return;
            for (const { body, level } of rabbitBodies) {
                const topY = body.position.y - RABBITS[level].radius;
                if (topY < DANGER_Y && Date.now() - body._spawnTime > 1500) {
                    gameOver = true;
                    return;
                }
            }
        }

        function randomStartLevel() {
            return Math.floor(Math.random() * 5);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, W, H);

            // Background — soft purple-blue gradient
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#0d1b2a');
            bg.addColorStop(1, '#1b1033');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Soft star dots in background
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            [[40,120],[80,300],[200,180],[310,90],[260,420],[130,500],[320,340]].forEach(([sx,sy]) => {
                ctx.beginPath();
                ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Top panel
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.fillRect(0, 0, W, PANEL_H);

            // Score labels
            ctx.fillStyle = '#999';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('分数', 80, 22);
            ctx.fillText('最高分', 280, 22);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 26px Arial';
            ctx.fillText(score, 80, 52);
            ctx.fillText(bestScore, 280, 52);

            // Next rabbit
            ctx.fillStyle = '#999';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('下一只', W / 2, 18);
            ctx.font = `${RABBITS[nextLevel].radius}px serif`;
            ctx.fillText(RABBITS[nextLevel].emoji, W / 2, 62);

            // Game area border
            ctx.strokeStyle = 'rgba(179,136,255,0.15)';
            ctx.lineWidth = 2;
            ctx.strokeRect(2, PANEL_H, W - 4, H - PANEL_H - 2);

            // Danger line
            ctx.strokeStyle = 'rgba(255,100,150,0.45)';
            ctx.setLineDash([8, 6]);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(4, DANGER_Y);
            ctx.lineTo(W - 4, DANGER_Y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Aim guide
            if (canDrop && !gameOver) {
                const r = RABBITS[currentLevel].radius;
                const cx = Math.max(r + 5, Math.min(W - r - 5, dropX));

                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.setLineDash([5, 7]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx, DROP_Y + r);
                ctx.lineTo(cx, H);
                ctx.stroke();
                ctx.setLineDash([]);

                drawRabbit(cx, DROP_Y, r, currentLevel, 0.7);
            }

            // Draw rabbits
            for (const { body, level } of rabbitBodies) {
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                drawRabbit(0, 0, RABBITS[level].radius, level, 1);
                ctx.restore();
            }

            // Merge effects (sparkle ring)
            mergeEffects = mergeEffects.filter(e => e.alpha > 0);
            for (const e of mergeEffects) {
                e.alpha -= 0.04;
                const expand = 1 + (1 - e.alpha) * 0.7;
                ctx.save();
                ctx.globalAlpha = e.alpha;
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r * expand, 0, Math.PI * 2);
                ctx.stroke();
                // Inner sparkle
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = e.alpha * 0.6;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r * expand * 0.65, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.78)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束 🐰💔', W / 2, H / 2 - 30);
                ctx.fillStyle = '#ccc';
                ctx.font = '22px Arial';
                ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);
            }

            requestAnimationFrame(gameLoop);
        }

        function drawRabbit(x, y, r, level, alpha) {
            const rabbit = RABBITS[level];
            ctx.globalAlpha = alpha;

            // Glow
            ctx.shadowColor = rabbit.color;
            ctx.shadowBlur = 14;

            // Circle
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.1, x, y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.4, rabbit.color);
            grad.addColorStop(1, shadeColor(rabbit.color, -30));
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Border
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Emoji
            ctx.font = `${r * 1.1}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'black';
            ctx.fillText(rabbit.emoji, x, y + r * 0.05);

            ctx.globalAlpha = 1;
            ctx.textBaseline = 'alphabetic';
        }

        function shadeColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + percent));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + percent));
            const b = Math.min(255, Math.max(0, (num & 0xff) + percent));
            return `rgb(${r},${g},${b})`;
        }

        function startNewGame() {
            rabbitBodies.forEach(({ body }) => Composite.remove(world, body));
            rabbitBodies = [];
            mergePending.clear();
            mergeEffects = [];
            score = 0;
            gameOver = false;
            canDrop = true;
            dropX = W / 2;
            currentLevel = randomStartLevel();
            nextLevel = randomStartLevel();
        }

        // Mouse
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            dropX = (e.clientX - rect.left) * (W / rect.width);
        });
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            dropX = (e.clientX - rect.left) * (W / rect.width);
            dropRabbit();
        });

        // Touch
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            dropX = (e.touches[0].clientX - rect.left) * (W / rect.width);
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            dropRabbit();
        }, { passive: false });

        initPhysics();
        startNewGame();
    </script>
</body>
</html>
